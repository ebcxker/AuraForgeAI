<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AuraForge – Debug: Image Not Respected</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
        button, input { background: #222; border: 1px solid #0f0; color: #0f0; padding: 8px; margin: 5px; cursor: pointer; }
        img { max-width: 300px; margin: 10px; border: 1px solid #0f0; }
        pre { background: #000; padding: 10px; overflow: auto; max-height: 400px; font-size: 12px; }
        .status { margin: 10px 0; }
        .error { color: #f88; }
    </style>
</head>
<body>
<h2>🔧 AuraForge – Debug: Why is the NFT image ignored?</h2>
<p>1. Select an image (your NFT)<br>2. Click "Test with Ultra‑Short Prompt"</p>
<input type="file" id="imageFile" accept="image/*">
<div id="preview"></div>
<button id="testShortBtn">🧪 Test with Short Prompt (POST)</button>
<button id="testBase64Btn">🧪 Test with Data URL (POST)</button>
<div id="status" class="status"></div>
<div id="result"></div>
<pre id="log"></pre>

<script>
    const IMGBB_API_KEY = "64261ff0372da570d6d3e682fb1a41f8";
    let selectedFile = null;
    let currentDataUrl = null;
    
    const logDiv = document.getElementById('log');
    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const fileInput = document.getElementById('imageFile');
    const previewDiv = document.getElementById('preview');
    const testShortBtn = document.getElementById('testShortBtn');
    const testBase64Btn = document.getElementById('testBase64Btn');
    
    function log(msg, isError = false) {
        const prefix = isError ? '❌ ' : '✓ ';
        logDiv.textContent += `[${new Date().toLocaleTimeString()}] ${prefix}${msg}\n`;
        console.log(msg);
    }
    
    fileInput.addEventListener('change', (e) => {
        selectedFile = e.target.files[0];
        if (!selectedFile) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            currentDataUrl = ev.target.result;
            previewDiv.innerHTML = `<img src="${currentDataUrl}"><br>${selectedFile.name}`;
        };
        reader.readAsDataURL(selectedFile);
        log(`File selected: ${selectedFile.name} (${(selectedFile.size/1024).toFixed(1)} KB)`);
        statusDiv.innerHTML = '';
        resultDiv.innerHTML = '';
    });
    
    async function uploadToImgBB(file) {
        const formData = new FormData();
        formData.append('image', file);
        formData.append('key', IMGBB_API_KEY);
        log('Uploading to ImgBB...');
        const response = await fetch('https://api.imgbb.com/1/upload', {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        if (!data.success) throw new Error(`ImgBB error: ${data.error?.message || 'Unknown'}`);
        log(`Upload success: ${data.data.url}`);
        return data.data.url;
    }
    
    // POST with ImgBB URL
    async function generateWithURL(prompt, imageUrl) {
        const requestBody = {
            prompt: prompt,
            model: "flux",
            width: 1024,
            height: 1024,
            image: imageUrl,
            strength: 0.05,
            nologo: true,
            seed: Date.now()
        };
        log(`POST request to Pollinations (IMG URL)`);
        log(`Request body: ${JSON.stringify(requestBody, null, 2).substring(0, 300)}...`);
        const response = await fetch('https://image.pollinations.ai/prompt/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody)
        });
        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errText.substring(0, 100)}`);
        }
        const blob = await response.blob();
        return URL.createObjectURL(blob);
    }
    
    // POST with Data URL (base64)
    async function generateWithDataURL(prompt, dataUrl) {
        const requestBody = {
            prompt: prompt,
            model: "flux",
            width: 1024,
            height: 1024,
            image: dataUrl,
            strength: 0.05,
            nologo: true,
            seed: Date.now()
        };
        log(`POST request to Pollinations (DATA URL, length: ${dataUrl.length})`);
        const response = await fetch('https://image.pollinations.ai/prompt/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody)
        });
        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errText.substring(0, 100)}`);
        }
        const blob = await response.blob();
        return URL.createObjectURL(blob);
    }
    
    const SHORT_PROMPT = "Keep the subject exactly as in the uploaded image. Only add a soft 3D glow and simple gradient background. Do not change the character.";
    
    testShortBtn.onclick = async () => {
        if (!selectedFile) { statusDiv.innerHTML = '❌ Select an image.'; return; }
        testShortBtn.disabled = true;
        statusDiv.innerHTML = '⏳ Uploading to ImgBB...';
        resultDiv.innerHTML = '';
        try {
            const imgUrl = await uploadToImgBB(selectedFile);
            statusDiv.innerHTML = '✅ Uploaded. Sending POST with URL...';
            log(`Using ImgBB URL: ${imgUrl}`);
            const generatedUrl = await generateWithURL(SHORT_PROMPT, imgUrl);
            statusDiv.innerHTML = '✅ Done. Check if subject matches original.';
            resultDiv.innerHTML = `<img src="${generatedUrl}"><br><a href="${generatedUrl}" download="test_url.png">💾 Download</a>`;
            log('Success with URL');
        } catch (err) {
            log(`ERROR: ${err.message}`, true);
            statusDiv.innerHTML = `❌ ${err.message}`;
        } finally {
            testShortBtn.disabled = false;
        }
    };
    
    testBase64Btn.onclick = async () => {
        if (!currentDataUrl) { statusDiv.innerHTML = '❌ Select an image.'; return; }
        testBase64Btn.disabled = true;
        statusDiv.innerHTML = '⏳ Sending Data URL directly (no ImgBB)...';
        resultDiv.innerHTML = '';
        try {
            log(`Data URL length: ${currentDataUrl.length}`);
            const generatedUrl = await generateWithDataURL(SHORT_PROMPT, currentDataUrl);
            statusDiv.innerHTML = '✅ Done. Check if subject matches original.';
            resultDiv.innerHTML = `<img src="${generatedUrl}"><br><a href="${generatedUrl}" download="test_base64.png">💾 Download</a>`;
            log('Success with Data URL');
        } catch (err) {
            log(`ERROR: ${err.message}`, true);
            statusDiv.innerHTML = `❌ ${err.message}`;
        } finally {
            testBase64Btn.disabled = false;
        }
    };
</script>
</body>
</html>
