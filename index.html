<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Replicate Debug – Isolate Failures</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
        button, input { background: #222; border: 1px solid #0f0; color: #0f0; padding: 8px; margin: 5px; cursor: pointer; }
        img { max-width: 300px; margin: 10px; border: 1px solid #0f0; }
        pre { background: #000; padding: 10px; overflow: auto; max-height: 400px; font-size: 12px; }
        .status { margin: 10px 0; }
        .error { color: #f88; }
    </style>
</head>
<body>
<h2>🔧 Replicate img2img – Step‑by‑Step Debug</h2>
<p>Loads API key from JSONBin. Then test each component separately.</p>

<div id="keyStatus"></div>
<button id="testTextBtn">1. Test Replicate (text‑to‑image)</button>
<hr>

<input type="file" id="imageFile" accept="image/*">
<div id="preview"></div>
<button id="testImgbbBtn">2. Test ImgBB Upload Only</button>
<div id="imgbbResult"></div>
<hr>

<button id="img2imgBtn" disabled>3. Run Full Img2img (after tests pass)</button>
<div id="status" class="status"></div>
<div id="result"></div>
<pre id="log"></pre>

<script>
    // ---------- CONFIGURATION ----------
    const JSONBIN_URL = "https://api.jsonbin.io/v3/b/6a1ba15e21f9ee59d29fc725/latest";
    const IMGBB_API_KEY = "64261ff0372da570d6d3e682fb1a41f8";
    const REPLICATE_MODEL = "stability-ai/sdxl";
    const REPLICATE_VERSION = "39ed52f2a78e934b3ba6e2a89f5b1c712de7dfea535525255b1aa35c5565e08b";

    let REPLICATE_API_TOKEN = null;
    let selectedFile = null;
    let uploadedImageUrl = null;  // store after successful upload

    const logDiv = document.getElementById('log');
    const keyStatusDiv = document.getElementById('keyStatus');
    const testTextBtn = document.getElementById('testTextBtn');
    const testImgbbBtn = document.getElementById('testImgbbBtn');
    const img2imgBtn = document.getElementById('img2imgBtn');
    const fileInput = document.getElementById('imageFile');
    const previewDiv = document.getElementById('preview');
    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const imgbbResultDiv = document.getElementById('imgbbResult');

    function log(msg, isError = false) {
        const prefix = isError ? '❌ ' : '✓ ';
        logDiv.textContent += `[${new Date().toLocaleTimeString()}] ${prefix}${msg}\n`;
        console.log(msg);
    }

    // ---------- Load API key from JSONBin ----------
    async function loadKey() {
        log("Fetching Replicate API key from JSONBin...");
        try {
            const response = await fetch(JSONBIN_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            const key = data.record?.replicate_token || data.replicate_token;
            if (!key || !key.startsWith('r8_')) throw new Error("Invalid key format");
            REPLICATE_API_TOKEN = key;
            log(`Key loaded: ${key.slice(0,8)}...`);
            keyStatusDiv.innerHTML = `✅ API key loaded (${key.slice(0,8)}...).`;
        } catch (err) {
            log(`Failed to load API key: ${err.message}`, true);
            keyStatusDiv.innerHTML = `❌ Failed to load API key. ${err.message}`;
        }
    }

    // ---------- 1. Test Replicate with text‑to‑image (no image input) ----------
    async function testTextToImage() {
        if (!REPLICATE_API_TOKEN) {
            alert("API key not loaded yet.");
            return;
        }
        log("Testing Replicate text‑to‑image (tiny prompt)...");
        try {
            const response = await fetch('https://api.replicate.com/v1/predictions', {
                method: 'POST',
                headers: {
                    'Authorization': `Token ${REPLICATE_API_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    version: REPLICATE_VERSION,
                    input: {
                        prompt: "a red apple",
                        num_inference_steps: 10,
                        guidance_scale: 7
                    }
                })
            });
            const respText = await response.text();
            log(`Text‑to‑image response status: ${response.status}`);
            log(`Response body: ${respText.substring(0, 300)}`);
            if (response.ok) {
                statusDiv.innerHTML = "✅ Replicate text‑to‑image works! API key is valid.";
            } else {
                statusDiv.innerHTML = `❌ Text‑to‑image failed (${response.status}). See log.`;
            }
        } catch (err) {
            log(`Text‑to‑image error: ${err.message}`, true);
            statusDiv.innerHTML = `❌ Error: ${err.message}`;
        }
    }

    testTextBtn.onclick = testTextToImage;

    // ---------- 2. Test ImgBB upload ----------
    async function testImgbbUpload() {
        if (!selectedFile) {
            alert("Please select an image first.");
            return;
        }
        log("Testing ImgBB upload...");
        const formData = new FormData();
        formData.append('image', selectedFile);
        formData.append('key', IMGBB_API_KEY);
        try {
            const response = await fetch('https://api.imgbb.com/1/upload', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            log(`ImgBB response status: ${response.status}`);
            if (data.success) {
                uploadedImageUrl = data.data.url;
                log(`ImgBB upload success: ${uploadedImageUrl}`);
                imgbbResultDiv.innerHTML = `✅ Uploaded! URL: <a href="${uploadedImageUrl}" target="_blank">${uploadedImageUrl}</a>`;
                statusDiv.innerHTML = "✅ ImgBB upload works. You can now run full img2img.";
                img2imgBtn.disabled = false;
            } else {
                throw new Error(data.error?.message || "Unknown error");
            }
        } catch (err) {
            log(`ImgBB upload error: ${err.message}`, true);
            imgbbResultDiv.innerHTML = `❌ Upload failed: ${err.message}`;
            statusDiv.innerHTML = "❌ ImgBB upload failed. Check API key or network.";
        }
    }

    testImgbbBtn.onclick = testImgbbUpload;

    // ---------- 3. Full img2img using uploaded ImgBB URL ----------
    async function runImg2img() {
        if (!REPLICATE_API_TOKEN) {
            alert("API key not loaded.");
            return;
        }
        if (!uploadedImageUrl) {
            alert("Please run the ImgBB upload test first and wait for success.");
            return;
        }
        log("Running Replicate img2img with uploaded image...");
        const prompt = "3D collectible render, preserve the character exactly, Pixar style, soft lighting, sparkles, no peace sign.";
        const requestBody = {
            version: REPLICATE_VERSION,
            input: {
                prompt: prompt,
                image: uploadedImageUrl,
                strength: 0.15,
                guidance_scale: 7,
                num_inference_steps: 25,
                negative_prompt: "low quality, blurry, deformed, peace sign"
            }
        };
        try {
            const response = await fetch('https://api.replicate.com/v1/predictions', {
                method: 'POST',
                headers: {
                    'Authorization': `Token ${REPLICATE_API_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestBody)
            });
            const respText = await response.text();
            log(`Img2img prediction creation status: ${response.status}`);
            log(`Response: ${respText.substring(0, 500)}`);
            if (!response.ok) {
                throw new Error(`Replicate error ${response.status}: ${respText}`);
            }
            const prediction = JSON.parse(respText);
            const predId = prediction.id;
            log(`Prediction ID: ${predId}`);

            // Poll for completion
            let output = null;
            let attempts = 0;
            while (attempts < 60 && !output) {
                await new Promise(r => setTimeout(r, 2000));
                const statusResp = await fetch(`https://api.replicate.com/v1/predictions/${predId}`, {
                    headers: { 'Authorization': `Token ${REPLICATE_API_TOKEN}` }
                });
                const statusData = await statusResp.json();
                log(`Poll ${attempts+1}: status = ${statusData.status}`);
                if (statusData.status === 'succeeded') {
                    output = statusData.output;
                    break;
                } else if (statusData.status === 'failed') {
                    throw new Error(`Replicate failed: ${JSON.stringify(statusData.error)}`);
                }
                attempts++;
            }
            if (!output) throw new Error('Prediction timed out');
            const resultUrl = typeof output === 'string' ? output : output[0];
            resultDiv.innerHTML = `<img src="${resultUrl}"><br><a href="${resultUrl}" download="auraforge_3d.png">💾 Download</a>`;
            statusDiv.innerHTML = "✅ Img2img succeeded! Character preserved.";
            log(`Success: ${resultUrl}`);
        } catch (err) {
            log(`Img2img error: ${err.message}`, true);
            statusDiv.innerHTML = `❌ ${err.message}`;
        }
    }

    img2imgBtn.onclick = runImg2img;

    // Image preview
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = (ev) => {
            previewDiv.innerHTML = `<img src="${ev.target.result}"><br>${file.name}`;
        };
        reader.readAsDataURL(file);
        log(`Image selected: ${file.name}`);
        statusDiv.innerHTML = "Image ready. Run ImgBB test first.";
        uploadedImageUrl = null; // reset
        img2imgBtn.disabled = true;
    });

    loadKey();
</script>
</body>
</html>
