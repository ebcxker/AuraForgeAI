<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AuraForge – Strong Subject Preservation (Pollinations)</title>
    <style>
        body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
        button, input { background: #333; color: #0f0; border: 1px solid #0f0; padding: 8px; margin: 5px; cursor: pointer; }
        .preview { max-width: 200px; margin: 10px; border: 1px solid #0f0; }
        .generated { max-width: 500px; margin: 10px; border: 2px solid #0f0; }
        pre { background: #000; padding: 10px; overflow: auto; max-height: 200px; font-size: 11px; }
    </style>
</head>
<body>
<h2>🔒 AuraForge – Edit Only, Keep Subject Identical</h2>
<p>Upload image → Pollinations will ONLY modify background/lighting, NOT the character</p>
<input type="file" id="imageFile" accept="image/*">
<div id="preview"></div>
<button id="generateBtn" disabled>✨ Generate (low strength, preserves subject)</button>
<div id="status"></div>
<div id="result"></div>
<pre id="log"></pre>

<script>
    const IMGBB_API_KEY = "64261ff0372da570d6d3e682fb1a41f8";
    
    // Prompt explicitly instructs to keep the character unchanged
    const PROMPT = `Do NOT change the character's face, body, outfit, proportions, or identity. Keep the subject EXACTLY as in the uploaded image. Only add a cinematic luxury fashion apocalypse background: neon rain, brutalist architecture, cold fog, reflective wet ground, dramatic lighting. The character must remain identical. 8K quality.`;

    const fileInput = document.getElementById('imageFile');
    const previewDiv = document.getElementById('preview');
    const generateBtn = document.getElementById('generateBtn');
    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const logDiv = document.getElementById('log');

    let uploadedImageUrl = null;

    function log(msg) {
        logDiv.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
        console.log(msg);
    }

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (ev) => {
            previewDiv.innerHTML = `<img src="${ev.target.result}" class="preview"><br>${file.name}`;
        };
        reader.readAsDataURL(file);
        
        statusDiv.innerHTML = '📤 Uploading to ImgBB...';
        generateBtn.disabled = true;
        log(`Uploading ${file.name}...`);
        
        const formData = new FormData();
        formData.append('image', file);
        formData.append('key', IMGBB_API_KEY);
        
        try {
            const response = await fetch('https://api.imgbb.com/1/upload', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            if (data.success) {
                uploadedImageUrl = data.data.url;
                log(`ImgBB URL: ${uploadedImageUrl}`);
                statusDiv.innerHTML = '✅ Ready. Click Generate.';
                generateBtn.disabled = false;
            } else {
                throw new Error(data.error?.message || 'Upload failed');
            }
        } catch (err) {
            log(`Upload error: ${err.message}`);
            statusDiv.innerHTML = `❌ Upload failed: ${err.message}`;
        }
    });

    generateBtn.onclick = async () => {
        if (!uploadedImageUrl) {
            statusDiv.innerHTML = '❌ Please select an image first.';
            return;
        }
        
        statusDiv.innerHTML = '⏳ Generating with strong subject preservation (strength 0.55)...';
        generateBtn.disabled = true;
        resultDiv.innerHTML = '';
        log(`Prompt: ${PROMPT.substring(0, 100)}...`);
        
        try {
            const encodedPrompt = encodeURIComponent(PROMPT);
            // Lower strength = keep more of original image. 0.55 means 45% influence from prompt.
            const url = `https://image.pollinations.ai/prompt/${encodedPrompt}?model=flux&width=1024&height=1024&image=${encodeURIComponent(uploadedImageUrl)}&strength=0.55&nologo=true`;
            const response = await fetch(url);
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errText.substring(0, 100)}`);
            }
            const blob = await response.blob();
            const imgUrl = URL.createObjectURL(blob);
            resultDiv.innerHTML = `<img src="${imgUrl}" class="generated"><br><a href="${imgUrl}" download="auraforge_edit.png">💾 Download</a>`;
            statusDiv.innerHTML = '✅ Done. Subject should be unchanged.';
            log('Success');
        } catch (err) {
            log(`Error: ${err.message}`);
            statusDiv.innerHTML = `❌ ${err.message}`;
        } finally {
            generateBtn.disabled = false;
        }
    };
</script>
</body>
</html>
