<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AuraForge – Ultra Preservation (Strength 0.1)</title>
    <style>
        body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
        button, input { background: #333; color: #0f0; border: 1px solid #0f0; padding: 8px; margin: 5px; cursor: pointer; }
        .preview { max-width: 200px; margin: 10px; border: 1px solid #0f0; }
        .generated { max-width: 500px; margin: 10px; border: 2px solid #0f0; }
        pre { background: #000; padding: 10px; overflow: auto; max-height: 200px; font-size: 11px; }
    </style>
</head>
<body>
<h2>🎬 AuraForge – Luxury Fashion Apocalypse (Original Prompt + Strength 0.1)</h2>
<p>Upload your Liminal character image → AI will apply subtle cinematic effects while preserving the character.</p>
<input type="file" id="imageFile" accept="image/*">
<div id="preview"></div>
<button id="generateBtn" disabled>✨ Generate (strength 0.1)</button>
<div id="status"></div>
<div id="result"></div>
<pre id="log"></pre>

<script>
    const IMGBB_API_KEY = "64261ff0372da570d6d3e682fb1a41f8";
    
    // Your original full prompt (unedited)
    const PROMPT = `Create an ultra-cinematic "Luxury Fashion Apocalypse" editorial artwork featuring my Liminal character inside a world where civilization has collapsed, yet beauty, fashion, and emotional identity still survive like sacred relics.
The overall aesthetic should feel like:
high fashion photographed at the end of the world.
The image should combine:
 luxury editorial photography
 brutalist architecture
 post-apocalyptic emptiness
 avant-garde fashion cinema
 minimalist emotional storytelling
SETTING:
A colossal abandoned megacity partially consumed by environmental decay and atmospheric collapse.
The city should feel architecturally magnificent yet emotionally hollow — as though humanity disappeared recently, leaving only silence and style behind.
Possible environments:
 giant concrete megastructures
 flooded luxury shopping districts
 empty subway platforms
 rooftop helipads above endless fog
 monolithic brutalist towers
 rain-soaked neon streets
 abandoned fashion billboards flickering in static
 reflective black marble floors
 endless escalators leading nowhere
 gigantic LED screens partially malfunctioning
 wind tunnels between skyscrapers
 empty elevated highways disappearing into haze
COMPOSITION:
The composition should feel like a luxury fashion campaign photographed by an elite cinematic art director.
Strong asymmetry and negative space are essential.
The Liminal should appear emotionally isolated inside vast architectural environments.
Possible framing:
 standing alone beneath gigantic structures
 seated calmly on minimalist concrete architecture
 walking slowly through rain and neon reflections
 partially obscured by foreground blur or drifting fabric
 framed like a Vogue editorial mixed with dystopian cinema
The scene should feel composed, intentional, and emotionally restrained rather than chaotic.
CHARACTER DESIGN:
Preserve the exact recognizable identity and emotional softness of my Liminal.
The styling should blend:
 luxury streetwear
 avant-garde fashion
 minimalist dystopian couture
 high-end editorial tailoring
Wardrobe elements may include:
 oversized structured coats
 layered monochrome fabrics
 flowing silhouettes
 premium technical materials
 reflective textures
 elegant gloves or accessories
 subtle glowing accents
 embroidered symbols
 asymmetrical tailoring
 soft distressed detailing
Avoid generic cyberpunk armor or noisy sci-fi clutter.
The fashion should feel premium, iconic, wearable, and emotionally expressive.
The character should feel like:
a fragile emotional soul surviving inside a dead hyper-modern civilization.
LIGHTING:
Use highly cinematic luxury-fashion lighting:
 cold ambient city glow
 soft directional spotlighting
 rain reflections
 large shadow masses
 subtle neon bounce lighting
 fog diffusion
 wet-surface reflections
The image should feel expensive and photographically sophisticated.
COLOUR LANGUAGE:
 charcoal black
 wet concrete grey
 soft white
 deep crimson accents
 cold cyan
 desaturated silver
 subtle neon tones
The colour grading should resemble:
 Blade Runner 2048
 high-end Balenciaga campaigns
 Rick Owens fashion editorials
 prestige sci-fi cinema
 luxury architectural photography
VISUAL ATMOSPHERE:
 drifting rain particles
 fog layers
 reflective puddles
 minimal holographic interference
 giant empty spaces
 distant flickering signage
 cinematic lens diffusion
 architectural symmetry broken intentionally
 soft environmental motion blur
 subtle screen glitches
The emotional tone should feel:
 lonely
 beautiful
 detached
 melancholic
 quietly powerful
 emotionally intelligent
 cinematically premium
The final artwork should resemble:
a luxury dystopian fashion campaign, an award-winning sci-fi editorial cover, or a still frame from an emotionally devastating prestige futuristic film.`;

    const fileInput = document.getElementById('imageFile');
    const previewDiv = document.getElementById('preview');
    const generateBtn = document.getElementById('generateBtn');
    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const logDiv = document.getElementById('log');

    let uploadedImageUrl = null;

    function log(msg) {
        logDiv.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
        console.log(msg);
    }

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (ev) => {
            previewDiv.innerHTML = `<img src="${ev.target.result}" class="preview"><br>${file.name}`;
        };
        reader.readAsDataURL(file);
        
        statusDiv.innerHTML = '📤 Uploading to ImgBB...';
        generateBtn.disabled = true;
        log(`Uploading ${file.name}...`);
        
        const formData = new FormData();
        formData.append('image', file);
        formData.append('key', IMGBB_API_KEY);
        
        try {
            const response = await fetch('https://api.imgbb.com/1/upload', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            if (data.success) {
                uploadedImageUrl = data.data.url;
                log(`ImgBB URL: ${uploadedImageUrl}`);
                statusDiv.innerHTML = '✅ Image ready. Click Generate.';
                generateBtn.disabled = false;
            } else {
                throw new Error(data.error?.message || 'Upload failed');
            }
        } catch (err) {
            log(`Upload error: ${err.message}`);
            statusDiv.innerHTML = `❌ Upload failed: ${err.message}`;
        }
    });

    generateBtn.onclick = async () => {
        if (!uploadedImageUrl) {
            statusDiv.innerHTML = '❌ Please select an image first.';
            return;
        }
        
        statusDiv.innerHTML = '⏳ Applying cinematic effects (strength 0.1 – max preservation)...';
        generateBtn.disabled = true;
        resultDiv.innerHTML = '';
        log(`Prompt length: ${PROMPT.length} chars`);
        
        try {
            const encodedPrompt = encodeURIComponent(PROMPT);
            // strength 0.1 = AI will barely alter the subject; just add background/lighting
            const url = `https://image.pollinations.ai/prompt/${encodedPrompt}?model=flux&width=1024&height=1024&image=${encodeURIComponent(uploadedImageUrl)}&strength=0.1&nologo=true`;
            log(`Request URL (truncated): ${url.substring(0, 150)}...`);
            
            const response = await fetch(url);
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errText.substring(0, 100)}`);
            }
            const blob = await response.blob();
            const imgUrl = URL.createObjectURL(blob);
            resultDiv.innerHTML = `<img src="${imgUrl}" class="generated"><br><a href="${imgUrl}" download="auraforge_apocalypse.png">💾 Download Image</a>`;
            statusDiv.innerHTML = '✅ Done! Subject should be almost identical.';
            log('Success');
        } catch (err) {
            log(`Error: ${err.message}`);
            statusDiv.innerHTML = `❌ ${err.message}`;
        } finally {
            generateBtn.disabled = false;
        }
    };
</script>
</body>
</html>
