<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Replicate – Exact Error Test</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
        pre { background: #000; padding: 10px; overflow: auto; white-space: pre-wrap; }
    </style>
</head>
<body>
<h2>🔍 Replicate API – Show Exact Error</h2>
<p>This test will call Replicate with a tiny text‑to‑image request and display the full response.</p>
<button id="testBtn">Run Test</button>
<pre id="output">Click the button.</pre>

<script>
    const JSONBIN_URL = "https://api.jsonbin.io/v3/b/6a1ba15e21f9ee59d29fc725/latest";
    let REPLICATE_API_TOKEN = null;

    async function loadKey() {
        try {
            const res = await fetch(JSONBIN_URL);
            const data = await res.json();
            return data.record?.replicate_token || data.replicate_token;
        } catch (e) {
            return null;
        }
    }

    document.getElementById('testBtn').onclick = async () => {
        const key = await loadKey();
        if (!key) {
            document.getElementById('output').innerText = "Failed to load API key from JSONBin.";
            return;
        }
        document.getElementById('output').innerText = "⏳ Sending request to Replicate...\n";
        try {
            const response = await fetch('https://api.replicate.com/v1/predictions', {
                method: 'POST',
                headers: {
                    'Authorization': `Token ${key}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    version: "39ed52f2a78e934b3ba6e2a89f5b1c712de7dfea535525255b1aa35c5565e08b",
                    input: { prompt: "a cat", num_inference_steps: 5 }
                })
            });
            const body = await response.text();
            document.getElementById('output').innerHTML = `
HTTP Status: ${response.status} ${response.statusText}\n\n
Response body:\n${body}
            `;
        } catch (err) {
            document.getElementById('output').innerText = `Network error: ${err.message}`;
        }
    };
</script>
</body>
</html>
