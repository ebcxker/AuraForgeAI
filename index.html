<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AuraForge – Replicate img2img (Subject Locked)</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
        button, input { background: #222; border: 1px solid #0f0; color: #0f0; padding: 8px; margin: 5px; cursor: pointer; }
        img { max-width: 300px; margin: 10px; border: 1px solid #0f0; }
        pre { background: #000; padding: 10px; overflow: auto; max-height: 300px; font-size: 12px; }
        .status { margin: 10px 0; }
        .error { color: #f88; }
    </style>
</head>
<body>
<h2>🔧 AuraForge – Replicate img2img (Exact Subject, Strength 0.15)</h2>
<p>1. Select an image (your NFT)<br>2. Click "Upload & Generate" – Replicate preserves the character exactly, adds 3D styling.</p>
<input type="file" id="imageFile" accept="image/*">
<div id="preview"></div>
<button id="processBtn">🚀 Upload & Generate</button>
<div id="status" class="status"></div>
<div id="result"></div>
<pre id="log"></pre>

<script>
    const IMGBB_API_KEY = "64261ff0372da570d6d3e682fb1a41f8";
    const REPLICATE_API_TOKEN = "r8_3aP9JfdDXGszJaHiwQIYFGBwhbgvoAy40haZj";
    // Use a model that supports img2img: stability-ai/stable-diffusion
    const REPLICATE_MODEL = "stability-ai/stable-diffusion";
    const REPLICATE_VERSION = "db21e45d3f7023abc2a46ee38a23973f6dce16bb082a930b0c49861f96d1e5bf";
    
    // Shortened 3D prompt – but full enough
    const PROMPT = `Transform the uploaded image into an ultra high-detail stylized 3D collectible render. Preserve the subject's EXACT facial features, proportions, outfit, colors, identity. Do NOT redesign. Dynamic selfie-style camera angle, one arm extended holding camera, wide-angle. Premium Pixar-quality CGI, smooth polished materials, soft reflections. Minimal abstract background with sparkles, studio rim lighting, depth of field. Octane render, ray tracing. Negative prompt: low quality, blurry, deformed, extra limbs, redesign, peace sign.`;
    
    const fileInput = document.getElementById('imageFile');
    const previewDiv = document.getElementById('preview');
    const processBtn = document.getElementById('processBtn');
    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const logDiv = document.getElementById('log');
    
    let selectedFile = null;
    
    function log(msg, isError = false) {
        const prefix = isError ? '❌ ' : '✓ ';
        logDiv.textContent += `[${new Date().toLocaleTimeString()}] ${prefix}${msg}\n`;
        console.log(msg);
    }
    
    fileInput.addEventListener('change', (e) => {
        selectedFile = e.target.files[0];
        if (!selectedFile) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            previewDiv.innerHTML = `<img src="${ev.target.result}"><br>${selectedFile.name}`;
        };
        reader.readAsDataURL(selectedFile);
        log(`File selected: ${selectedFile.name} (${(selectedFile.size/1024).toFixed(1)} KB)`);
        statusDiv.innerHTML = '';
        resultDiv.innerHTML = '';
    });
    
    async function uploadToImgBB(file) {
        const formData = new FormData();
        formData.append('image', file);
        formData.append('key', IMGBB_API_KEY);
        log('Uploading to ImgBB...');
        const response = await fetch('https://api.imgbb.com/1/upload', {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        if (!data.success) throw new Error(`ImgBB error: ${data.error?.message || 'Unknown'}`);
        log(`Upload success: ${data.data.url}`);
        return data.data.url;
    }
    
    async function generateWithReplicate(prompt, imageUrl) {
        // 1. Create prediction
        log('Creating Replicate prediction...');
        const predictionResponse = await fetch('https://api.replicate.com/v1/predictions', {
            method: 'POST',
            headers: {
                'Authorization': `Token ${REPLICATE_API_TOKEN}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                version: REPLICATE_VERSION,
                input: {
                    prompt: prompt,
                    image: imageUrl,
                    strength: 0.15,   // 85% original, 15% style
                    guidance_scale: 7,
                    num_inference_steps: 30,
                    negative_prompt: "low quality, blurry, deformed, extra limbs, redesign, peace sign"
                }
            })
        });
        if (!predictionResponse.ok) {
            const errText = await predictionResponse.text();
            throw new Error(`Replicate prediction error: ${predictionResponse.status} - ${errText}`);
        }
        const prediction = await predictionResponse.json();
        log(`Prediction ID: ${prediction.id}`);
        
        // 2. Poll for completion
        let output = null;
        let pollCount = 0;
        const maxPolls = 60;
        while (pollCount < maxPolls && !output) {
            await new Promise(resolve => setTimeout(resolve, 2000));
            const statusResp = await fetch(`https://api.replicate.com/v1/predictions/${prediction.id}`, {
                headers: { 'Authorization': `Token ${REPLICATE_API_TOKEN}` }
            });
            const statusData = await statusResp.json();
            log(`Poll ${pollCount+1}: status = ${statusData.status}`);
            if (statusData.status === 'succeeded') {
                output = statusData.output;
                break;
            } else if (statusData.status === 'failed') {
                throw new Error(`Replicate failed: ${statusData.error}`);
            }
            pollCount++;
        }
        if (!output) throw new Error('Prediction timed out');
        
        // output is an array of image URLs (usually one)
        const imageUrlOut = Array.isArray(output) ? output[0] : output;
        return imageUrlOut;
    }
    
    processBtn.onclick = async () => {
        if (!selectedFile) {
            statusDiv.innerHTML = '❌ Please select an image first.';
            return;
        }
        
        processBtn.disabled = true;
        statusDiv.innerHTML = '⏳ Uploading to ImgBB...';
        resultDiv.innerHTML = '';
        
        try {
            const uploadedUrl = await uploadToImgBB(selectedFile);
            statusDiv.innerHTML = '✅ Upload complete. Sending to Replicate (may take 20-40s)...';
            log(`ImgBB URL: ${uploadedUrl}`);
            log(`Prompt: ${PROMPT.substring(0, 150)}...`);
            
            const generatedImageUrl = await generateWithReplicate(PROMPT, uploadedUrl);
            statusDiv.innerHTML = '✅ Generation complete! Subject should be preserved.';
            resultDiv.innerHTML = `<img src="${generatedImageUrl}"><br><a href="${generatedImageUrl}" download="auraforge_3d.png">💾 Download</a>`;
            log('Success – image generated via Replicate');
        } catch (err) {
            log(`ERROR: ${err.message}`, true);
            statusDiv.innerHTML = `❌ ${err.message}`;
            statusDiv.classList.add('error');
        } finally {
            processBtn.disabled = false;
        }
    };
</script>
</body>
</html>
