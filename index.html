<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AuraForge – Replicate via CORS Proxy (Long Prompt)</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
        button, input { background: #222; border: 1px solid #0f0; color: #0f0; padding: 8px; margin: 5px; cursor: pointer; }
        img { max-width: 300px; margin: 10px; border: 1px solid #0f0; }
        pre { background: #000; padding: 10px; overflow: auto; max-height: 300px; font-size: 12px; }
        .status { margin: 10px 0; }
        .error { color: #f88; }
    </style>
</head>
<body>
<h2>🔧 Replicate img2img – CORS Proxy (Long 3D Prompt)</h2>
<p>Key from JSONBin, proxy key provided, ImgBB upload, strength 0.15.</p>
<input type="file" id="imageFile" accept="image/*">
<div id="preview"></div>
<button id="generateBtn" disabled>⏳ Loading API key...</button>
<div id="status" class="status"></div>
<div id="result"></div>
<pre id="log"></pre>

<script>
    // ---------- CONFIGURATION ----------
    const JSONBIN_URL = "https://api.jsonbin.io/v3/b/6a1ba15e21f9ee59d29fc725/latest";
    const IMGBB_API_KEY = "64261ff0372da570d6d3e682fb1a41f8";
    const CORS_PROXY_URL = "https://proxy.cors.sh/";
    const CORS_GATEWAY_KEY = "cfx_c8a5f7cfb4171771e0604bd2c8b2c241";

    // Replicate SDXL img2img version
    const REPLICATE_MODEL = "stability-ai/sdxl";
    const REPLICATE_VERSION = "39ed52f2a78e934b3ba6e2a89f5b1c712de7dfea535525255b1aa35c5565e08b";

    let REPLICATE_API_TOKEN = null;
    let selectedFile = null;

    const fileInput = document.getElementById('imageFile');
    const previewDiv = document.getElementById('preview');
    const generateBtn = document.getElementById('generateBtn');
    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const logDiv = document.getElementById('log');

    function log(msg, isError = false) {
        const prefix = isError ? '❌ ' : '✓ ';
        logDiv.textContent += `[${new Date().toLocaleTimeString()}] ${prefix}${msg}\n`;
        console.log(msg);
    }

    // ---------- 1. Fetch Replicate API key from JSONBin ----------
    async function fetchApiKey() {
        log("Fetching Replicate API key from JSONBin...");
        try {
            const response = await fetch(JSONBIN_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            const key = data.record?.replicate_token || data.replicate_token;
            if (!key || !key.startsWith('r8_')) throw new Error("Invalid key format");
            REPLICATE_API_TOKEN = key;
            log(`Key loaded: ${key.slice(0,8)}...`);
            generateBtn.disabled = false;
            generateBtn.textContent = "🚀 Generate via CORS Proxy";
            statusDiv.innerHTML = "✅ API key ready. Upload an image.";
        } catch (err) {
            log(`Failed to load API key: ${err.message}`, true);
            statusDiv.innerHTML = `❌ Could not load API key. ${err.message}`;
            generateBtn.disabled = true;
        }
    }

    // ---------- 2. Image upload & preview ----------
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = (ev) => {
            previewDiv.innerHTML = `<img src="${ev.target.result}"><br>${file.name}`;
        };
        reader.readAsDataURL(file);
        log(`Image selected: ${file.name}`);
        statusDiv.innerHTML = "Image ready. Click Generate.";
    });

    // ---------- 3. Upload to ImgBB ----------
    async function uploadToImgBB(file) {
        const formData = new FormData();
        formData.append('image', file);
        formData.append('key', IMGBB_API_KEY);
        const response = await fetch('https://api.imgbb.com/1/upload', {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        if (!data.success) throw new Error(`ImgBB error: ${data.error?.message}`);
        return data.data.url;
    }

    // ---------- 4. Call Replicate via CORS proxy ----------
    async function generateWithReplicate(prompt, imageUrl) {
        const requestBody = {
            version: REPLICATE_VERSION,
            input: {
                prompt: prompt,
                image: imageUrl,
                strength: 0.15,
                guidance_scale: 7,
                num_inference_steps: 30,
                negative_prompt: "low quality, blurry, deformed, extra limbs, redesign, peace sign"
            }
        };
        log("Sending request via CORS proxy...");
        const response = await fetch(CORS_PROXY_URL, {
            method: 'POST',
            headers: {
                'x-cors-gateway': CORS_GATEWAY_KEY,
                'Content-Type': 'application/json',
                'Target-URL': 'https://api.replicate.com/v1/predictions'
            },
            body: JSON.stringify(requestBody)
        });
        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`Proxy error ${response.status}: ${errText}`);
        }
        const prediction = await response.json();
        const predId = prediction.id;
        log(`Prediction ID: ${predId}`);

        // Poll for completion (also through proxy)
        let output = null;
        let attempts = 0;
        while (attempts < 60 && !output) {
            await new Promise(r => setTimeout(r, 2000));
            const statusResp = await fetch(CORS_PROXY_URL, {
                method: 'GET',
                headers: {
                    'x-cors-gateway': CORS_GATEWAY_KEY,
                    'Target-URL': `https://api.replicate.com/v1/predictions/${predId}`
                }
            });
            const statusData = await statusResp.json();
            log(`Poll ${attempts+1}: status = ${statusData.status}`);
            if (statusData.status === 'succeeded') {
                output = statusData.output;
                break;
            } else if (statusData.status === 'failed') {
                throw new Error(`Replicate failed: ${JSON.stringify(statusData.error)}`);
            }
            attempts++;
        }
        if (!output) throw new Error('Prediction timed out');
        return typeof output === 'string' ? output : output[0];
    }

    // ---------- 5. Main generation ----------
    generateBtn.onclick = async () => {
        if (!REPLICATE_API_TOKEN) {
            statusDiv.innerHTML = "❌ API key not loaded. Wait or refresh.";
            return;
        }
        if (!selectedFile) {
            statusDiv.innerHTML = "❌ Please select an image first.";
            return;
        }

        generateBtn.disabled = true;
        statusDiv.innerHTML = "⏳ Uploading to ImgBB...";
        resultDiv.innerHTML = '';

        try {
            const imageUrl = await uploadToImgBB(selectedFile);
            log(`ImgBB URL: ${imageUrl}`);
            statusDiv.innerHTML = "⏳ Sending to Replicate via CORS proxy (20‑40s)...";

            // Your long 3D prompt (full version)
            const fullPrompt = `Using the uploaded image as the EXACT visual identity and reference, transform the subject into an ultra high-detail stylized 3D character/render while preserving the original subject’s defining features, proportions, colors, personality, clothing, symbols, and overall design language with near-perfect accuracy.

The final image should look like a professionally sculpted premium CGI collectible created by a world-class VFX and animation studio.

MANDATORY PRESERVATION RULES:
- Preserve the subject EXACTLY as shown in the uploaded image
- Maintain the original facial structure, expression, proportions, outfit, accessories, colors, and recognizable traits
- Keep the core identity and silhouette fully recognizable
- Do NOT redesign or reinterpret the character/object
- Do NOT alter the personality or mood
- Preserve all important symbols, textures, and details

POSE & COMPOSITION:
- Dynamic selfie-style camera angle
- One arm extended outward toward the viewer holding the "camera"
- Wide-angle perspective for cinematic depth
- Subject positioned prominently in the center
- Cute, stylish, confident energy

STYLE REQUIREMENTS:
- Ultra high-detail cinematic 3D render
- Premium designer-toy / collectible figure aesthetic
- Smooth polished materials
- Rounded stylized forms
- Soft reflections and realistic shading
- Pixar-quality CGI rendering
- Highly detailed textures and materials
- Clean stylized anatomy
- Cute but premium visual style

SCENE REQUIREMENTS:
- Minimal abstract background inspired by the image’s color palette
- Soft gradients and flowing shapes
- Floating sparkles, glow accents, or stylized particles
- Studio-quality cinematic lighting
- Rim lighting and soft shadows
- Depth of field for realism

RENDER QUALITY:
Ultra-detailed, octane render, ray tracing, global illumination, cinematic lighting, subsurface scattering, soft shadows, depth of field, high-end CGI, stylized realism, collectible vinyl figure aesthetic, social-media-ready composition, extremely polished, production-quality 3D rendering.

NEGATIVE PROMPT:
low quality, blurry, deformed, extra limbs, duplicate features, incorrect proportions, redesign, realism mismatch, messy background, text, watermark, bad anatomy, distorted face, oversaturated, low-detail textures, peace sign, hand gesture`;
            const resultUrl = await generateWithReplicate(fullPrompt, imageUrl);
            resultDiv.innerHTML = `<img src="${resultUrl}"><br><a href="${resultUrl}" download="auraforge_3d.png">💾 Download</a>`;
            statusDiv.innerHTML = "✅ Generation complete! Character should be preserved.";
            log(`Success: ${resultUrl}`);
        } catch (err) {
            log(`ERROR: ${err.message}`, true);
            statusDiv.innerHTML = `❌ ${err.message}`;
        } finally {
            generateBtn.disabled = false;
        }
    };

    fetchApiKey();
</script>
</body>
</html>
