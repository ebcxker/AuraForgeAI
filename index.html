<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AuraForge – Debug: Is Image Sent?</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
        button, input { background: #222; border: 1px solid #0f0; color: #0f0; padding: 8px; margin: 5px; cursor: pointer; }
        img { max-width: 300px; margin: 10px; border: 1px solid #0f0; }
        pre { background: #000; padding: 10px; overflow: auto; max-height: 400px; font-size: 12px; }
        .status { margin: 10px 0; }
        .error { color: #f88; }
    </style>
</head>
<body>
<h2>🔧 AuraForge – Debug: Is the NFT image being sent?</h2>
<p>1. Select an image (your NFT)<br>2. Click "Upload & Generate" – we'll log the full Pollinations URL and the response.</p>
<input type="file" id="imageFile" accept="image/*">
<div id="preview"></div>
<button id="processBtn">🚀 Upload & Generate (Debug)</button>
<div id="status" class="status"></div>
<div id="result"></div>
<pre id="log"></pre>

<script>
    const IMGBB_API_KEY = "64261ff0372da570d6d3e682fb1a41f8";
    
    // EXTREMELY SHORT PROMPT – only asks to keep the subject
    const TEST_PROMPT = "Do not change the subject. Keep it exactly as in the uploaded photo. Only add soft 3D lighting and a simple gradient background.";
    
    const fileInput = document.getElementById('imageFile');
    const previewDiv = document.getElementById('preview');
    const processBtn = document.getElementById('processBtn');
    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const logDiv = document.getElementById('log');
    
    let selectedFile = null;
    
    function log(msg, isError = false) {
        const prefix = isError ? '❌ ' : '✓ ';
        logDiv.textContent += `[${new Date().toLocaleTimeString()}] ${prefix}${msg}\n`;
        console.log(msg);
    }
    
    fileInput.addEventListener('change', (e) => {
        selectedFile = e.target.files[0];
        if (!selectedFile) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            previewDiv.innerHTML = `<img src="${ev.target.result}"><br>${selectedFile.name}`;
        };
        reader.readAsDataURL(selectedFile);
        log(`File selected: ${selectedFile.name} (${(selectedFile.size/1024).toFixed(1)} KB)`);
        statusDiv.innerHTML = '';
        resultDiv.innerHTML = '';
    });
    
    async function uploadToImgBB(file) {
        const formData = new FormData();
        formData.append('image', file);
        formData.append('key', IMGBB_API_KEY);
        log('Uploading to ImgBB...');
        const response = await fetch('https://api.imgbb.com/1/upload', {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        if (!data.success) throw new Error(`ImgBB error: ${data.error?.message || 'Unknown'}`);
        log(`Upload success: ${data.data.url}`);
        return data.data.url;
    }
    
    async function generateWithPollinations(prompt, imageUrl) {
        const encodedPrompt = encodeURIComponent(prompt);
        // EXTREMELY LOW strength = 0.05 (95% original, 5% style)
        const strength = 0.05;
        const url = `https://image.pollinations.ai/prompt/${encodedPrompt}?model=flux&width=1024&height=1024&image=${encodeURIComponent(imageUrl)}&strength=${strength}&nologo=true&seed=${Date.now()}`;
        log(`Full Pollinations URL (first 300 chars): ${url.substring(0, 300)}...`);
        log(`URL length: ${url.length} characters`);
        log(`Strength = ${strength} (should preserve 95% of original)`);
        const response = await fetch(url);
        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errText.substring(0, 100)}`);
        }
        const blob = await response.blob();
        return URL.createObjectURL(blob);
    }
    
    processBtn.onclick = async () => {
        if (!selectedFile) {
            statusDiv.innerHTML = '❌ Please select an image first.';
            return;
        }
        
        processBtn.disabled = true;
        statusDiv.innerHTML = '⏳ Uploading to ImgBB...';
        resultDiv.innerHTML = '';
        
        try {
            const uploadedUrl = await uploadToImgBB(selectedFile);
            statusDiv.innerHTML = '✅ Upload complete. Sending to Pollinations...';
            log(`ImgBB URL: ${uploadedUrl}`);
            
            const generatedImageUrl = await generateWithPollinations(TEST_PROMPT, uploadedUrl);
            statusDiv.innerHTML = '✅ Generation complete. Check if the output looks like your original image.';
            resultDiv.innerHTML = `<img src="${generatedImageUrl}"><br><a href="${generatedImageUrl}" download="test_output.png">💾 Download</a>`;
            log('Success – image generated');
        } catch (err) {
            log(`ERROR: ${err.message}`, true);
            statusDiv.innerHTML = `❌ ${err.message}`;
            statusDiv.classList.add('error');
        } finally {
            processBtn.disabled = false;
        }
    };
</script>
</body>
</html>
