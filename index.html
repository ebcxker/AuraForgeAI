<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AuraForge – Pollinations + ImgBB (Luxury Apocalypse)</title>
    <style>
        body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
        button, input { background: #333; color: #0f0; border: 1px solid #0f0; padding: 8px; margin: 5px; cursor: pointer; }
        .preview { max-width: 200px; margin: 10px; border: 1px solid #0f0; }
        .generated { max-width: 500px; margin: 10px; border: 2px solid #0f0; }
        textarea { width: 100%; background: #000; color: #0f0; border: 1px solid #0f0; padding: 8px; font-family: monospace; }
        pre { background: #000; padding: 10px; overflow: auto; max-height: 200px; font-size: 11px; }
    </style>
</head>
<body>
<h2>🔥 AuraForge – Luxury Fashion Apocalypse (Pollinations)</h2>
<p>1. Upload your Liminal character image → auto‑upload to ImgBB<br>2. Click Generate → Pollinations transforms it with your cinematic prompt</p>
<input type="file" id="imageFile" accept="image/*">
<div id="preview"></div>

<button id="generateBtn" disabled>🚀 Generate with Pollinations</button>
<div id="status"></div>
<div id="result"></div>
<pre id="log"></pre>

<script>
    const IMGBB_API_KEY = "64261ff0372da570d6d3e682fb1a41f8";
    
    // Your full prompt (shortened slightly for URL length but keeps all critical instructions)
    const PROMPT = `Create an ultra-cinematic "Luxury Fashion Apocalypse" editorial artwork featuring my Liminal character. Civilization collapsed, but beauty and fashion survive. High fashion photography + brutalist architecture + post-apocalyptic emptiness + avant-garde fashion cinema. SETTING: colossal abandoned megacity, giant concrete megastructures, flooded luxury districts, rain-soaked neon streets, reflective black marble floors. COMPOSITION: strong asymmetry, negative space, character emotionally isolated. CHARACTER DESIGN: preserve exact identity, blend luxury streetwear, avant-garde fashion, oversized structured coats, layered monochrome fabrics, flowing silhouettes. LIGHTING: cold ambient city glow, soft directional spotlighting, rain reflections, fog diffusion. COLOUR: charcoal black, wet concrete grey, deep crimson accents, cold cyan. VISUAL ATMOSPHERE: drifting rain, fog, reflective puddles, giant empty spaces, cinematic lens diffusion. Emotional tone: lonely, beautiful, melancholic. Preserve the character's face, proportions, outfit exactly. 8K quality.`;

    const fileInput = document.getElementById('imageFile');
    const previewDiv = document.getElementById('preview');
    const generateBtn = document.getElementById('generateBtn');
    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const logDiv = document.getElementById('log');

    let uploadedImageUrl = null;

    function log(msg) {
        logDiv.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
        console.log(msg);
    }

    // Upload to ImgBB
    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        // Preview
        const reader = new FileReader();
        reader.onload = (ev) => {
            previewDiv.innerHTML = `<img src="${ev.target.result}" class="preview"><br>${file.name}`;
        };
        reader.readAsDataURL(file);
        
        statusDiv.innerHTML = '📤 Uploading to ImgBB...';
        generateBtn.disabled = true;
        log(`Uploading ${file.name}...`);
        
        const formData = new FormData();
        formData.append('image', file);
        formData.append('key', IMGBB_API_KEY);
        
        try {
            const response = await fetch('https://api.imgbb.com/1/upload', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            if (data.success) {
                uploadedImageUrl = data.data.url;
                log(`ImgBB URL: ${uploadedImageUrl}`);
                statusDiv.innerHTML = '✅ Image uploaded. Ready to generate.';
                generateBtn.disabled = false;
            } else {
                throw new Error(data.error?.message || 'Upload failed');
            }
        } catch (err) {
            log(`Upload error: ${err.message}`);
            statusDiv.innerHTML = `❌ Upload failed: ${err.message}`;
        }
    });

    // Generate with Pollinations (image as subject + prompt)
    generateBtn.onclick = async () => {
        if (!uploadedImageUrl) {
            statusDiv.innerHTML = '❌ Please select an image first.';
            return;
        }
        
        statusDiv.innerHTML = '⏳ Pollinations is crafting your luxury apocalypse (10-30 sec)...';
        generateBtn.disabled = true;
        resultDiv.innerHTML = '';
        log(`Sending to Pollinations with prompt length: ${PROMPT.length} chars`);
        
        try {
            const encodedPrompt = encodeURIComponent(PROMPT);
            // Using flux model, strength 0.75 to preserve character identity
            const url = `https://image.pollinations.ai/prompt/${encodedPrompt}?model=flux&width=1024&height=1024&image=${encodeURIComponent(uploadedImageUrl)}&strength=0.75&nologo=true`;
            log(`Request URL (truncated): ${url.substring(0, 150)}...`);
            
            const response = await fetch(url);
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errText.substring(0, 100)}`);
            }
            const blob = await response.blob();
            const imgUrl = URL.createObjectURL(blob);
            resultDiv.innerHTML = `<img src="${imgUrl}" class="generated"><br><a href="${imgUrl}" download="auraforge_apocalypse.png">💾 Download Image</a>`;
            statusDiv.innerHTML = '✅ Generation complete!';
            log('Success');
        } catch (err) {
            log(`Error: ${err.message}`);
            statusDiv.innerHTML = `❌ ${err.message}`;
        } finally {
            generateBtn.disabled = false;
        }
    };
</script>
</body>
</html>
