<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollinations AI · Image + Prompt = Edited Photo</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            text-align: center;
            color: #a0a0a0;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .workflow {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .image-area {
            background: #f5f5f5;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .image-area img {
            max-width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 10px;
        }

        .placeholder {
            color: #999;
            text-align: center;
            padding: 60px 20px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
            font-weight: bold;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-generate {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            font-size: 1.1rem;
            padding: 14px 28px;
            width: 100%;
        }

        .status {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 12px;
            margin-top: 15px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .prompt-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            margin: 15px 0;
            font-family: inherit;
            resize: vertical;
        }

        .prompt-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .example-prompts {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .example-btn {
            background: #e0e7ff;
            color: #333;
            font-size: 0.75rem;
            padding: 5px 12px;
            margin: 0;
        }

        @media (max-width: 768px) {
            .workflow {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Pollinations AI Image Editor</h1>
        <div class="subtitle">Upload a photo + Enter a prompt = AI edits your photo</div>

        <div class="workflow">
            <!-- Left Panel -->
            <div class="card">
                <div class="card-title">
                    📤 Your Photo
                </div>
                <div class="image-area" id="uploadArea">
                    <img id="uploadedImage" src="" style="display: none;">
                    <div id="uploadPlaceholder" class="placeholder">
                        📸 Click to upload a photo
                    </div>
                </div>
                <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" style="display: none;">
                <div style="text-align: center;">
                    <button onclick="document.getElementById('fileInput').click()">
                        📁 Choose Photo
                    </button>
                    <button onclick="clearImage()" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                        🗑 Clear
                    </button>
                </div>

                <div class="card-title" style="margin-top: 20px;">
                    ✍️ Edit Prompt
                </div>
                <textarea id="promptInput" class="prompt-input" rows="3" placeholder="Example: 'add wings to this person' or 'make the background red'"></textarea>
                
                <div class="example-prompts">
                    <strong>Try these:</strong>
                    <button class="example-btn" onclick="setPrompt('add angel wings behind this person')">🪽 Add wings</button>
                    <button class="example-btn" onclick="setPrompt('change the background to red')">🔴 Red background</button>
                    <button class="example-btn" onclick="setPrompt('make the person wear sunglasses')">😎 Sunglasses</button>
                    <button class="example-btn" onclick="setPrompt('turn this into a anime character')">🎨 Anime style</button>
                    <button class="example-btn" onclick="setPrompt('add a crown on the head')">👑 Add crown</button>
                </div>
            </div>

            <!-- Right Panel -->
            <div class="card">
                <div class="card-title">
                    ✨ AI Edited Result
                </div>
                <div class="image-area" id="resultArea">
                    <img id="resultImage" src="" style="display: none;">
                    <div id="resultPlaceholder" class="placeholder">
                        🎨 AI edited image will appear here
                    </div>
                </div>
                
                <button id="generateBtn" onclick="editWithPollinations()" class="btn-generate">
                    🚀 Edit Photo with Pollinations AI
                </button>
                
                <div class="status" id="statusMessage">
                    💡 Upload a photo → Write a prompt → Click edit
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const fileInput = document.getElementById('fileInput');
        const uploadedImage = document.getElementById('uploadedImage');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const resultImage = document.getElementById('resultImage');
        const resultPlaceholder = document.getElementById('resultPlaceholder');
        const generateBtn = document.getElementById('generateBtn');
        const statusDiv = document.getElementById('statusMessage');
        const promptInput = document.getElementById('promptInput');
        
        // State
        let currentImageFile = null;
        let isGenerating = false;
        
        function setPrompt(text) {
            promptInput.value = text;
        }
        
        // Handle file upload
        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files.length > 0) {
                const file = e.target.files[0];
                if (!file.type.startsWith('image/')) {
                    statusDiv.innerHTML = '❌ Please upload an image file';
                    statusDiv.style.borderLeftColor = '#dc2626';
                    return;
                }
                
                currentImageFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    uploadedImage.src = e.target.result;
                    uploadedImage.style.display = 'block';
                    uploadPlaceholder.style.display = 'none';
                    statusDiv.innerHTML = '✅ Photo loaded! Write a prompt and click Edit.';
                    statusDiv.style.borderLeftColor = '#10b981';
                };
                reader.readAsDataURL(file);
            }
        });
        
        function clearImage() {
            currentImageFile = null;
            uploadedImage.src = '';
            uploadedImage.style.display = 'none';
            uploadPlaceholder.style.display = 'flex';
            resultImage.src = '';
            resultImage.style.display = 'none';
            resultPlaceholder.style.display = 'flex';
            statusDiv.innerHTML = '🖼️ Cleared. Upload a new photo.';
        }
        
        async function editWithPollinations() {
            if (!currentImageFile) {
                statusDiv.innerHTML = '⚠️ Please upload a photo first.';
                statusDiv.style.borderLeftColor = '#f97316';
                return;
            }
            
            const prompt = promptInput.value.trim();
            if (!prompt) {
                statusDiv.innerHTML = '⚠️ Please enter an edit prompt (e.g., "add wings to this person")';
                statusDiv.style.borderLeftColor = '#f97316';
                return;
            }
            
            if (isGenerating) {
                statusDiv.innerHTML = '⏳ Already editing... please wait.';
                return;
            }
            
            isGenerating = true;
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<span class="loader"></span> Pollinations AI is editing...';
            statusDiv.innerHTML = `🎨 Sending your photo + "${prompt}" to Pollinations AI...`;
            statusDiv.style.borderLeftColor = '#3b82f6';
            
            resultPlaceholder.style.display = 'flex';
            resultPlaceholder.innerHTML = '⏳ AI is editing your photo...<br>This takes 15-30 seconds';
            resultImage.style.display = 'none';
            
            try {
                // Create form data with image
                const formData = new FormData();
                formData.append('image', currentImageFile);
                
                // Use Pollinations image generation endpoint with the prompt
                // The image is sent along with the prompt to guide the generation
                const encodedPrompt = encodeURIComponent(prompt);
                
                // Pollinations API - sends image + prompt together
                const response = await fetch(`https://image.pollinations.ai/prompt/${encodedPrompt}?model=flux&seed=${Math.floor(Math.random() * 1000000)}`, {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Pollinations error: ${response.status} - ${errorText.substring(0, 200)}`);
                }
                
                const imageBlob = await response.blob();
                const imageUrl = URL.createObjectURL(imageBlob);
                
                resultImage.src = imageUrl;
                resultImage.style.display = 'block';
                resultPlaceholder.style.display = 'none';
                statusDiv.innerHTML = `✅ Done! AI edited your photo: "${prompt}"`;
                statusDiv.style.borderLeftColor = '#10b981';
                
                if (window._currentResultUrl) {
                    URL.revokeObjectURL(window._currentResultUrl);
                }
                window._currentResultUrl = imageUrl;
                
            } catch (error) {
                console.error('Pollinations error:', error);
                statusDiv.innerHTML = `❌ Error: ${error.message}. Pollinations may require API key for this feature.`;
                statusDiv.style.borderLeftColor = '#dc2626';
                resultPlaceholder.style.display = 'flex';
                resultPlaceholder.innerHTML = '⚠️ Edit failed<br>See error message above';
            } finally {
                isGenerating = false;
                generateBtn.disabled = false;
                generateBtn.innerHTML = '🚀 Edit Photo with Pollinations AI';
            }
        }
    </script>
</body>
</html>
