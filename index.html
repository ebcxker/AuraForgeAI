<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AuraForge – Pollinations img2img (Forced)</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
        button, input { background: #222; border: 1px solid #0f0; color: #0f0; padding: 8px; margin: 5px; cursor: pointer; }
        img { max-width: 300px; margin: 10px; border: 1px solid #0f0; }
        pre { background: #000; padding: 10px; overflow: auto; max-height: 300px; font-size: 12px; }
        .status { margin: 10px 0; }
        .error { color: #f88; }
    </style>
</head>
<body>
<h2>🔧 AuraForge – Pollinations img2img (Forced, Strength 0.1)</h2>
<p>1. Select an image (your NFT)<br>2. Click "Generate" – AI will apply minimal 3D styling while preserving the subject.</p>
<input type="file" id="imageFile" accept="image/*">
<div id="preview"></div>
<button id="processBtn">🚀 Generate (Pollinations)</button>
<div id="status" class="status"></div>
<div id="result"></div>
<pre id="log"></pre>

<script>
    // ULTRA-SHORT PROMPT – directly commands preservation
    const PROMPT = "Keep the subject EXACTLY as in the uploaded photo. Do not change face, body, clothes. Add very soft 3D collectible render style: smooth materials, subtle sparkles, studio lighting. No redesign, no peace sign.";
    
    const fileInput = document.getElementById('imageFile');
    const previewDiv = document.getElementById('preview');
    const processBtn = document.getElementById('processBtn');
    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const logDiv = document.getElementById('log');
    
    let currentDataUrl = null;
    
    function log(msg, isError = false) {
        const prefix = isError ? '❌ ' : '✓ ';
        logDiv.textContent += `[${new Date().toLocaleTimeString()}] ${prefix}${msg}\n`;
        console.log(msg);
    }
    
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            currentDataUrl = ev.target.result;
            previewDiv.innerHTML = `<img src="${currentDataUrl}"><br>${file.name}`;
        };
        reader.readAsDataURL(file);
        log(`File selected: ${file.name} (${(file.size/1024).toFixed(1)} KB)`);
        statusDiv.innerHTML = '';
        resultDiv.innerHTML = '';
    });
    
    async function generateWithPollinations() {
        const strength = 0.1; // 90% original, 10% style – max preservation
        const model = "flux-realism"; // better for img2img than standard flux
        const requestBody = {
            prompt: PROMPT,
            model: model,
            width: 1024,
            height: 1024,
            image: currentDataUrl, // send as data URL directly
            strength: strength,
            nologo: true,
            seed: Date.now()
        };
        log(`Sending POST with strength=${strength}, model=${model}`);
        log(`Prompt: ${PROMPT}`);
        const response = await fetch('https://image.pollinations.ai/prompt/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody)
        });
        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errText.substring(0, 100)}`);
        }
        const blob = await response.blob();
        return URL.createObjectURL(blob);
    }
    
    processBtn.onclick = async () => {
        if (!currentDataUrl) {
            statusDiv.innerHTML = '❌ Please select an image first.';
            return;
        }
        
        processBtn.disabled = true;
        statusDiv.innerHTML = '⏳ Sending to Pollinations (may take 20-30s)...';
        resultDiv.innerHTML = '';
        
        try {
            const generatedImageUrl = await generateWithPollinations();
            statusDiv.innerHTML = '✅ Generation complete! Subject should be identical.';
            resultDiv.innerHTML = `<img src="${generatedImageUrl}"><br><a href="${generatedImageUrl}" download="auraforge_output.png">💾 Download</a>`;
            log('Success – image generated via Pollinations img2img');
        } catch (err) {
            log(`ERROR: ${err.message}`, true);
            statusDiv.innerHTML = `❌ ${err.message}`;
            statusDiv.classList.add('error');
        } finally {
            processBtn.disabled = false;
        }
    };
</script>
</body>
</html>
