<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AuraForge – 3D Render (Subject Locked)</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
        button, input { background: #222; border: 1px solid #0f0; color: #0f0; padding: 8px; margin: 5px; cursor: pointer; }
        img { max-width: 300px; margin: 10px; border: 1px solid #0f0; }
        pre { background: #000; padding: 10px; overflow: auto; max-height: 300px; font-size: 12px; }
        .status { margin: 10px 0; }
        .error { color: #f88; }
    </style>
</head>
<body>
<h2>🔧 AuraForge – 3D Render (Subject Locked, Strength 0.15)</h2>
<p>1. Select an image (your NFT)<br>2. Click "Upload & Generate" – AI preserves the character exactly, only adds 3D styling.</p>
<input type="file" id="imageFile" accept="image/*">
<div id="preview"></div>
<button id="processBtn">🚀 Upload & Generate</button>
<div id="status" class="status"></div>
<div id="result"></div>
<pre id="log"></pre>

<script>
    const IMGBB_API_KEY = "64261ff0372da570d6d3e682fb1a41f8";
    
    // Shortened but detailed prompt with explicit subject preservation
    const FULL_PROMPT = `CRITICAL: Use the uploaded image as the EXACT subject. Do not change the character. Only add 3D stylization, lighting, and background. Preserve all facial features, outfit, colors, identity.

Transform the subject into an ultra high-detail stylized 3D collectible render with Pixar-quality CGI, smooth polished materials, soft reflections, and stylized realism.

POSE: Dynamic selfie-style camera angle, one arm extended holding the "camera", wide-angle perspective, subject centered, confident energy.

SCENE: Minimal abstract background inspired by image's color palette, soft gradients, floating sparkles, studio cinematic lighting with rim light and soft shadows, depth of field.

RENDER QUALITY: Octane render, ray tracing, global illumination, subsurface scattering, extremely polished.

MANDATORY: Preserve the subject EXACTLY – original facial structure, expression, proportions, outfit, accessories, colors. Do NOT redesign, alter mood, or add peace sign.

NEGATIVE PROMPT: low quality, blurry, deformed, extra limbs, duplicate features, incorrect proportions, redesign, realism mismatch, messy background, text, watermark, bad anatomy, distorted face, peace sign.`;
    
    const fileInput = document.getElementById('imageFile');
    const previewDiv = document.getElementById('preview');
    const processBtn = document.getElementById('processBtn');
    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const logDiv = document.getElementById('log');
    
    let selectedFile = null;
    
    function log(msg, isError = false) {
        const prefix = isError ? '❌ ' : '✓ ';
        logDiv.textContent += `[${new Date().toLocaleTimeString()}] ${prefix}${msg}\n`;
        console.log(msg);
    }
    
    fileInput.addEventListener('change', (e) => {
        selectedFile = e.target.files[0];
        if (!selectedFile) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            previewDiv.innerHTML = `<img src="${ev.target.result}"><br>${selectedFile.name}`;
        };
        reader.readAsDataURL(selectedFile);
        log(`File selected: ${selectedFile.name} (${(selectedFile.size/1024).toFixed(1)} KB)`);
        statusDiv.innerHTML = '';
        resultDiv.innerHTML = '';
    });
    
    async function uploadToImgBB(file) {
        const formData = new FormData();
        formData.append('image', file);
        formData.append('key', IMGBB_API_KEY);
        log('Uploading to ImgBB...');
        const response = await fetch('https://api.imgbb.com/1/upload', {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        if (!data.success) throw new Error(`ImgBB error: ${data.error?.message || 'Unknown'}`);
        log(`Upload success: ${data.data.url}`);
        return data.data.url;
    }
    
    async function generateWithPollinations(prompt, imageUrl) {
        const encodedPrompt = encodeURIComponent(prompt);
        const strength = 0.15; // Maximum preservation
        const url = `https://image.pollinations.ai/prompt/${encodedPrompt}?model=flux&width=1024&height=1024&image=${encodeURIComponent(imageUrl)}&strength=${strength}&nologo=true&seed=${Date.now()}`;
        log(`Pollinations URL length: ${url.length} characters`);
        log(`Strength = ${strength} (85% original, 15% style)`);
        const response = await fetch(url);
        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errText.substring(0, 100)}`);
        }
        const blob = await response.blob();
        return URL.createObjectURL(blob);
    }
    
    processBtn.onclick = async () => {
        if (!selectedFile) {
            statusDiv.innerHTML = '❌ Please select an image first.';
            return;
        }
        
        processBtn.disabled = true;
        statusDiv.innerHTML = '⏳ Uploading to ImgBB...';
        resultDiv.innerHTML = '';
        
        try {
            const uploadedUrl = await uploadToImgBB(selectedFile);
            statusDiv.innerHTML = '✅ Upload complete. Sending to Pollinations...';
            log(`ImgBB URL: ${uploadedUrl}`);
            log(`Prompt length: ${FULL_PROMPT.length} characters`);
            
            const generatedImageUrl = await generateWithPollinations(FULL_PROMPT, uploadedUrl);
            statusDiv.innerHTML = '✅ Generation complete! Subject should be nearly identical.';
            resultDiv.innerHTML = `<img src="${generatedImageUrl}"><br><a href="${generatedImageUrl}" download="auraforge_3d.png">💾 Download</a>`;
            log('Success – image generated');
        } catch (err) {
            log(`ERROR: ${err.message}`, true);
            statusDiv.innerHTML = `❌ ${err.message}`;
            statusDiv.classList.add('error');
        } finally {
            processBtn.disabled = false;
        }
    };
</script>
</body>
</html>
