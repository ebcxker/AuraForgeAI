<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pollinations Direct Test</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
        button, input { background: #222; border: 1px solid #0f0; color: #0f0; padding: 8px; margin: 5px; }
        img { max-width: 300px; margin: 10px; border: 1px solid #0f0; }
        pre { background: #000; padding: 10px; overflow: auto; max-height: 300px; }
    </style>
</head>
<body>
<h2>🔧 Pollinations img2img Debug</h2>
<p>Select an image (your NFT) → click Generate → see full response</p>
<input type="file" id="imageFile" accept="image/*">
<div id="preview"></div>
<button id="generateBtn">🚀 Generate</button>
<div id="status"></div>
<div id="result"></div>
<pre id="log"></pre>

<script>
    const fileInput = document.getElementById('imageFile');
    const previewDiv = document.getElementById('preview');
    const generateBtn = document.getElementById('generateBtn');
    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const logDiv = document.getElementById('log');

    let currentDataUrl = null;

    function log(msg) {
        logDiv.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
        console.log(msg);
    }

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            currentDataUrl = ev.target.result;
            previewDiv.innerHTML = `<img src="${currentDataUrl}"><br>${file.name}`;
            log(`Image loaded, dataUrl length: ${currentDataUrl.length}`);
        };
        reader.readAsDataURL(file);
    });

    generateBtn.onclick = async () => {
        if (!currentDataUrl) {
            statusDiv.innerHTML = '❌ Please select an image';
            return;
        }

        const prompt = "cinematic luxury apocalypse, preserve the subject exactly, neon rain, brutalist architecture";
        const strength = 0.6;
        const encodedPrompt = encodeURIComponent(prompt);
        
        // Build URL with data URL directly
        const url = `https://image.pollinations.ai/prompt/${encodedPrompt}?model=flux&width=1024&height=1024&image=${encodeURIComponent(currentDataUrl)}&strength=${strength}&nologo=true&seed=${Date.now()}`;
        
        log(`Request URL length: ${url.length}`);
        log(`First 200 chars: ${url.substring(0, 200)}...`);
        
        statusDiv.innerHTML = '⏳ Sending request...';
        generateBtn.disabled = true;
        resultDiv.innerHTML = '';
        
        try {
            const response = await fetch(url);
            log(`HTTP status: ${response.status} ${response.statusText}`);
            
            if (!response.ok) {
                const text = await response.text();
                log(`Error body: ${text.substring(0, 500)}`);
                throw new Error(`HTTP ${response.status}: ${text.substring(0, 100)}`);
            }
            
            const blob = await response.blob();
            const imgUrl = URL.createObjectURL(blob);
            resultDiv.innerHTML = `<img src="${imgUrl}"><br><a href="${imgUrl}" download="output.png">Download</a>`;
            statusDiv.innerHTML = '✅ Success!';
            log('Success');
        } catch (err) {
            log(`ERROR: ${err.message}`);
            statusDiv.innerHTML = `❌ ${err.message}`;
        } finally {
            generateBtn.disabled = false;
        }
    };
</script>
</body>
</html>
